<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Something For You ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
color:white;
}

h1{
font-size:40px;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:20px;
margin:10px;
cursor:pointer;
}

#yes{
background:green;
color:white;
}

#no{
background:red;
color:white;
position:absolute;
}

#gameArea{
position:relative;
width:100%;
height:100vh;
}

.heart{
position:absolute;
font-size:40px;
cursor:pointer;
}

#question{
display:none;
}

</style>
</head>

<body>

<div id="gameArea">

<h1 id="gameText">Catch 3 hearts to unlock my question ❤️</h1>

</div>

<div id="question">

<h1>Will you be my girlfriend? ❤️</h1>

<button id="yes">Yes 💖</button>
<button id="no">No 🙈</button>

</div>

<script>

let score = 0
let gameArea = document.getElementById("gameArea")

function spawnHeart(){

let heart = document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*90+"vw"
heart.style.top=Math.random()*80+"vh"

heart.onclick=function(){

score++
heart.remove()

if(score>=3){
startQuestion()
}

}

gameArea.appendChild(heart)

setTimeout(()=>{
heart.remove()
},2000)

}

setInterval(spawnHeart,800)

function startQuestion(){

gameArea.style.display="none"
document.getElementById("question").style.display="block"

}

/* NO button escape */

let noBtn = document.getElementById("no")

noBtn.addEventListener("mouseover",()=>{

let x=Math.random()*(window.innerWidth-100)
let y=Math.random()*(window.innerHeight-100)

noBtn.style.left=x+"px"
noBtn.style.top=y+"px"

})

/* YES ending */

document.getElementById("yes").onclick=function(){

document.body.innerHTML=`

<h1>YAYYY ❤️</h1>

<h2>You just made me the happiest person alive</h2>

<h2>I promise to always make you smile 😊</h2>

<h2>I love you 💖</h2>

`

}

</script>

</body>
</html>
